<ion-app>
  <ion-content [fullscreen]="true">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid px-3">
        <a class="navbar-brand mb-0 h1" routerLink="/">{{ title }}</a>
        <div class="d-flex align-items-center gap-2">
          <span class="navbar-text text-white small" *ngIf="user">👋 {{ user.name }}</span>
          <button class="btn btn-outline-light btn-sm" *ngIf="isLoggedIn" (click)="logout()">Logout</button>
        </div>
      </div>
    </nav>

    <div class="app-shell container-fluid px-0">
      <main class="app-content container py-4">
        <router-outlet></router-outlet>
      </main>
    </div>
  </ion-content>

  <div class="loading-overlay" *ngIf="isLoading" aria-live="polite">
    <div class="loading-panel card shadow-sm">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <span class="ms-3">Loading workspace data...</span>
    </div>
  </div>

  <div class="app-toast-container" *ngIf="(responseHandler.toasts$ | async) as toasts" aria-live="polite">
    <div *ngFor="let toast of toasts"
      class="app-toast alert d-flex align-items-start justify-content-between shadow-sm"
      [ngClass]="{
        'alert-success': toast.type === 'success',
        'alert-danger': toast.type === 'error',
        'alert-warning': toast.type === 'warning',
        'alert-info': toast.type === 'info'
      }"
      role="alert">
      <div>
        <strong *ngIf="toast.title" class="d-block">{{ toast.title }}</strong>
        <span>{{ toast.message }}</span>
      </div>
      <button type="button" class="btn-close" aria-label="Close" (click)="responseHandler.removeToast(toast.id)" *ngIf="toast.closeable !== false"></button>
    </div>
  </div>
</ion-app>
