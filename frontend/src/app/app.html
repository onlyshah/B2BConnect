<div class="app-shell">
  <router-outlet></router-outlet>

  <div class="toast-stack" *ngIf="responseHandler.toasts$ | async as toasts">
    <div *ngFor="let toast of toasts; trackBy: trackByToast" class="toast" [class]="toast.type">
      <div class="toast-title" *ngIf="toast.title">{{ toast.title }}</div>
      <div class="toast-message">{{ toast.message }}</div>
      <button type="button" class="toast-close" (click)="responseHandler.removeToast(toast.id)">×</button>
    </div>
  </div>

  <ui-confirm-dialog
    *ngIf="responseHandler.confirm$ | async as confirmState"
    [open]="confirmState.open"
    [title]="confirmState.options?.title || 'Confirm action'"
    [message]="confirmState.options?.message || 'Are you sure you want to continue?'"
    [confirmText]="confirmState.options?.confirmText || 'Confirm'"
    [cancelText]="confirmState.options?.cancelText || 'Cancel'"
    [confirmVariant]="confirmState.options?.confirmVariant || 'danger'"
    [icon]="confirmState.options?.icon"
    (confirmed)="handleConfirm()"
    (cancelled)="handleCancel()"
  ></ui-confirm-dialog>
</div>
