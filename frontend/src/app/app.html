<ion-app>
  <ion-content [fullscreen]="true">
    <header class="app-header">
      <div class="app-header-inner">
        <a class="app-brand" routerLink="/">{{ title }}</a>
        <div class="app-header-actions">
          <span class="user-greeting" *ngIf="user">👋 {{ user.name }}</span>
          <ui-button variant="secondary" *ngIf="isLoggedIn" (clicked)="logout()">Logout</ui-button>
        </div>
      </div>
    </header>

    <div class="app-shell">
      <main class="app-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </ion-content>

  <div class="loading-overlay" *ngIf="isLoading" aria-live="polite">
    <ui-card class="loading-panel">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <span class="loading-text">Loading workspace data...</span>
    </ui-card>
  </div>

  <div class="app-toast-container" *ngIf="(responseHandler.toasts$ | async) as toasts" aria-live="polite">
    <div *ngFor="let toast of toasts" class="app-toast alert"
      [ngClass]="{
        'alert-success': toast.type === 'success',
        'alert-danger': toast.type === 'error',
        'alert-warning': toast.type === 'warning',
        'alert-info': toast.type === 'info'
      }"
      role="alert">
      <div>
        <strong *ngIf="toast.title" class="toast-title">{{ toast.title }}</strong>
        <span>{{ toast.message }}</span>
      </div>
      <ui-button type="button" variant="ghost" class="btn btn-icon btn-close" aria-label="Close" (clicked)="responseHandler.removeToast(toast.id)" *ngIf="toast.closeable !== false"></ui-button>
    </div>
  </div>
</ion-app>
