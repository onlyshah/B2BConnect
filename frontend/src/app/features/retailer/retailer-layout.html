<dashboard-layout

  [title]="title"
  [subtitle]="subtitle"
  [eyebrow]="eyebrow"
  [roleLabel]="roleLabel"
  [searchPlaceholder]="searchPlaceholder"
  [storageKey]="storageKey"
  [navGroups]="navGroups"
  [mobileNavItems]="mobileNavItems"
>

  </div>

  <router-outlet></router-outlet>
