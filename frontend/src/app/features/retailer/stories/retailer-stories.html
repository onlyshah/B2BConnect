<div class="stories-stack">
  <div class="story-card" *ngFor="let story of stories">
    <div class="story-head">
      <strong>{{ story.title }}</strong>
      <span>{{ story.type }}</span>
    </div>
    <p>{{ story.body }}</p>
    <div class="story-actions">
      <ui-button variant="ghost" class="story-action">View</ui-button>
      <ui-button variant="ghost" class="story-action">Like</ui-button>
      <ui-button variant="primary" class="story-action">Order</ui-button>
    </div>
    <small>{{ story.likes }} likes</small>
  </div>
</div>
