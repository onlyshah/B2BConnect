<ui-page-shell title="Distributors" eyebrow="network" description="Monitor distributor onboarding, performance, and network health in one view.">
  <div class="module-shell">
    <div class="module-hero">
      <span class="module-tag">Network overview</span>
      <h2>Keep your distributor network healthy and visible</h2>
      <p>Review active partners, pending approvals, and key operational summaries from a single screen.</p>
    </div>

    <div class="module-grid">
      <ui-card title="Approval queue" subtitle="Pending review">
        <div class="module-list">
          <div class="module-row"><span>Requests</span><strong>{{ distributors.length || 0 }}</strong></div>
          <div class="module-row"><span>Average response</span><strong>2.4 hrs</strong></div>
        </div>
        <div class="module-actions" style="margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap;">
          <button type="button" class="ui-button success" (click)="requestApprove('demo')">Approve</button>
          <button type="button" class="ui-button danger" (click)="requestReject('demo')">Reject</button>
        </div>
      </ui-card>

      <ui-card title="Coverage" subtitle="Regional health">
        <div class="module-card">
          <div class="module-metrics">
            <span class="module-pill">🗺️ 12 zones</span>
            <span class="module-pill">📈 +8% growth</span>
          </div>
        </div>
      </ui-card>
    </div>
  </div>
</ui-page-shell>\n
