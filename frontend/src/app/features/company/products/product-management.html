<div class="product-management">
  <ui-card [elevated]="true" class="product-shell">
    <div class="section-header">
      <div>
        <p class="eyebrow">Catalog operations</p>
        <h3>Products</h3>
        <p class="section-copy">Track packaged SKUs, prices, and product readiness for the company network.</p>
      </div>
      <div class="action-row">
        <ui-button variant="secondary" (clicked)="loadProducts()">Refresh</ui-button>
        <ui-button variant="primary" (clicked)="createProduct()">Add product</ui-button>
      </div>
    </div>

    <div class="stats-grid">
      <ui-stat-card label="Products" [value]="products.length"></ui-stat-card>
      <ui-stat-card label="Status" [value]="products.length ? 'Live' : 'No data'" [trendType]="products.length ? 'positive' : 'neutral'"></ui-stat-card>
    </div>

    <app-product-editor *ngIf="showEditor" [product]="selectedProduct" (saved)="onSaved()"></app-product-editor>

    <div *ngIf="loading" class="state">Loading products...</div>

    <div *ngIf="!loading && products.length > 0" class="table-shell">
      <table>
        <thead><tr><th>Name</th><th>SKU</th><th>Brand</th><th>MRP</th><th>Actions</th></tr></thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>{{p.name}}</td>
            <td>{{p.sku}}</td>
            <td>{{p.brand || '-'}}</td>
            <td>{{p.mrp || '-'}}</td>
            <td><ui-button type="button" variant="ghost" (clicked)="editProduct(p)">Edit</ui-button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!loading && products.length === 0" class="state empty">No products have been added yet.</div>
  </ui-card>
</div>
