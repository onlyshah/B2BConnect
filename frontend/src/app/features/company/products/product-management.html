<ui-page-shell title="Product management" eyebrow="catalog" description="Browse your product catalog and keep key details ready for updates.">
  <ng-container slot="actions">
    <ui-button variant="secondary">Import</ui-button>
    <ui-button (click)="createProduct()">+ New product</ui-button>
  </ng-container>

  <ui-empty-state *ngIf="loading" title="Loading products" description="Fetching the latest catalog entries."></ui-empty-state>

  <div class="page-grid" *ngIf="!loading">
    <ui-card *ngFor="let product of products" [title]="product.name || 'Product'" [subtitle]="product.sku || 'SKU pending'">
      <div class="product-card__meta">
        <span>{{ product.brand || 'Brand pending' }}</span>
        <strong>{{ product.mrp | currency:'INR':'symbol':'1.0-0' }}</strong>
      </div>
      <div class="product-card__footer">
        <span>{{ product.launchStatus || 'draft' }}</span>
        <ui-button variant="secondary" (click)="editProduct(product)">Edit</ui-button>
      </div>
    </ui-card>
  </div>

  <div class="empty-state" *ngIf="!loading && !products.length">
    <p>No catalog entries are available yet. Create your first product to get started.</p>
  </div>

  <app-product-editor *ngIf="showEditor" [product]="selectedProduct" (saved)="onSaved()"></app-product-editor>
</ui-page-shell>\n
