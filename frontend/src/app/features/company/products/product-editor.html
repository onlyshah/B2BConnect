<ui-page-shell title="Product editor" eyebrow="catalog" description="Capture the essentials for your next product update.">
  <ui-card title="Product details" subtitle="Add pricing, SKU, and packaging info before publishing">
    <form class="form-grid" [formGroup]="form" (ngSubmit)="save()">
      <label>
        <span>Name</span>
        <input formControlName="name" />
      </label>
      <label>
        <span>SKU</span>
        <input formControlName="sku" />
      </label>
      <label>
        <span>MRP</span>
        <input type="number" formControlName="mrp" />
      </label>
      <label>
        <span>GST</span>
        <input type="number" formControlName="gst" />
      </label>
      <label>
        <span>Brand</span>
        <input formControlName="brand" />
      </label>
      <label>
        <span>Pack size</span>
        <input formControlName="packSize" />
      </label>
      <label>
        <span>Weight</span>
        <input formControlName="weight" />
      </label>
      <label>
        <span>Launch status</span>
        <select formControlName="launchStatus">
          <option value="draft">Draft</option>
          <option value="active">Active</option>
          <option value="archived">Archived</option>
        </select>
      </label>
      <div class="modal-actions">
        <ui-button variant="secondary" type="button">Cancel</ui-button>
        <ui-button type="submit">Save product</ui-button>
      </div>
    </form>
  </ui-card>
</ui-page-shell>\n
