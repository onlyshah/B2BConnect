<dashboard-layout
  [appName]="appName"
  [title]="title"
  [subtitle]="subtitle"
  [eyebrow]="eyebrow"
  [roleLabel]="roleLabel"
  [searchPlaceholder]="searchPlaceholder"
  [storageKey]="storageKey"
  [navGroups]="navGroups"
  [mobileNavItems]="mobileNavItems"
>
  <div slot="header-actions" class="d-flex flex-wrap gap-2">
    <ui-button variant="primary" class="btn-sm fw-semibold" routerLink="/company/distributors">Review distributors</ui-button>
    <ui-button variant="ghost" class="btn-sm fw-semibold" routerLink="/company/analytics">Open analytics</ui-button>
  </div>

  <router-outlet></router-outlet>
</dashboard-layout>
