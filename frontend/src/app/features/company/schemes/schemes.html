<div class="schemes">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3>Schemes</h3>
      <p class="text-muted mb-0">Manage promotional schemes and discounts</p>
    </div>
    <div>
      <button class="btn btn-secondary btn-sm me-2" type="button" (click)="createScheme()">Add Scheme</button>
      <button class="btn btn-primary btn-sm" type="button" (click)="loadSchemes()">Refresh</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-center text-muted py-4">Loading schemes...</div>
  <div *ngIf="!loading && message" class="text-danger py-3">{{ message }}</div>

  <table *ngIf="!loading && schemes.length > 0" class="table table-striped">
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Valid Until</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let scheme of schemes">
        <td>{{ scheme.title || scheme.name || 'Untitled' }}</td>
        <td>{{ scheme.status || '-' }}</td>
        <td>{{ scheme.expiresAt ? (scheme.expiresAt | date:'mediumDate') : '-' }}</td>
      </tr>
    </tbody>
  </table>

    <div *ngIf="!loading && !schemes.length" class="text-center text-muted py-4">No schemes found.</div>
  <div *ngIf="!loading && !schemes.length" class="text-center py-2">
    <button class="btn btn-outline-primary btn-sm" (click)="createScheme()">Create first scheme</button>
  </div>

  <!-- Simple modal for creating a scheme -->
  <div *ngIf="schemeModalOpen" class="modal-backdrop d-flex align-items-center justify-content-center">
    <div class="card p-3" style="min-width:320px; max-width:560px;">
      <h5 class="mb-2">Create Scheme</h5>
      <div class="mb-2">
        <label class="form-label">Title</label>
        <input class="form-control form-control-sm" [(ngModel)]="newSchemeTitle" />
      </div>
      <div class="mb-2">
        <label class="form-label">Expires At (optional)</label>
        <input type="date" class="form-control form-control-sm" [(ngModel)]="newSchemeExpiresAt" />
      </div>
      <div class="text-end">
        <button class="btn btn-secondary btn-sm me-2" (click)="schemeModalOpen=false">Cancel</button>
        <button class="btn btn-primary btn-sm" (click)="submitCreateScheme()">Create</button>
      </div>
    </div>
  </div>
</div>
