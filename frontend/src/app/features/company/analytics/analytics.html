<ui-page-shell title="Analytics" eyebrow="insights" description="Review the operating health of products, orders, retailers, and finance at a glance.">
  <ng-container slot="actions">
    <ui-button variant="secondary">Download</ui-button>
    <ui-button>Refresh</ui-button>
  </ng-container>

  <ui-list-toolbar title="Operating insights" subtitle="Review the health of your business in one view."></ui-list-toolbar>

  <ui-empty-state *ngIf="loading" title="Loading analytics" description="Gathering the latest business signals."></ui-empty-state>
  <ui-empty-state *ngIf="message && !loading" title="We hit a snag" [description]="message" tone="error"></ui-empty-state>

  <ui-form-field label="Search metrics" hint="Use the shared field primitive for future filters">
    <input type="text" placeholder="Search analytics" />
  </ui-form-field>

  <div class="page-grid" *ngIf="!loading && !message">
    <ui-card *ngFor="let metric of metrics" [title]="metric.label" [subtitle]="metric.unit || 'Current state'">
      <div class="metric-value">{{ metric.value }}</div>
    </ui-card>

    <ui-card title="Sales trend" subtitle="Recent order movement">
      <svg class="chart" [attr.width]="chartWidth" [attr.height]="chartHeight" viewBox="0 0 420 180" aria-label="sales trend chart">
        <polyline [attr.points]="trendPoints" fill="none" stroke="var(--color-primary)" stroke-width="3"></polyline>
      </svg>
    </ui-card>

    <ui-card title="Inventory watchlist" subtitle="Items that need attention">
      <div class="stack-list" *ngFor="let item of inventoryItems">
        <span>{{ item.label }}</span>
        <strong>{{ item.stock }} / {{ item.reorderLevel }}</strong>
      </div>
    </ui-card>
  </div>
</ui-page-shell>\n
