<section class="page-card dashboard-shell">
  <div class="hero-card">
    <div>
      <p class="eyebrow">Welcome back</p>
      <h2>Here’s a quick overview of your workspace</h2>
      <p class="muted">Track activity, orders, stock, and partner health in one view.</p>
    </div>
    <ui-button type="button">View reports</ui-button>
  </div>

  <div class="stat-grid" *ngIf="metrics.length">
    <app-metric-card *ngFor="let metric of metrics" [metric]="metric"></app-metric-card>
  </div>

  <div class="content-grid">
    <ui-card title="Recent activity" subtitle="A quick pulse on the latest workspace movement">
      <ul class="list-stack">
        <li *ngFor="let card of dashboardCards">
          <span>{{ card.icon }}</span>
          <div>
            <strong>{{ card.title }}</strong>
            <p>{{ card.subtitle }}</p>
          </div>
          <b>{{ card.value }}</b>
        </li>
      </ul>
    </ui-card>

    <ui-card title="Performance trend" subtitle="Live operating trend">
      <div class="chart-area">
        <svg viewBox="0 0 360 180" role="img" aria-label="Performance chart">
          <polyline [attr.points]="trendPoints"></polyline>
        </svg>
      </div>
    </ui-card>
  </div>
</section>\n
