<div class="route-shell">
  <section class="route-card" *ngIf="loading">
    <p class="muted">Loading route data...</p>
  </section>

  <section class="route-card" *ngIf="error && !loading">
    <p class="error">{{ error }}</p>
  </section>

  <section class="route-card" *ngIf="!loading">
    <h3>Today's route</h3>
    <p class="muted">Optimized route sequence for the current day.</p>
    <div class="route-flow">
      <span *ngFor="let stop of routePlan; let i = index">{{ stop }}<small *ngIf="i < routePlan.length - 1">→</small></span>
    </div>
    <div class="stop" *ngFor="let stop of routeStops">
      <div>
        <strong>{{ stop.retailer }}</strong>
        <p>{{ stop.area }} • expected visit at {{ stop.time }}</p>
      </div>
      <span>{{ stop.priority }}</span>
    </div>
  </section>

  <section class="route-card" *ngIf="!loading">
    <h3>Live route actions</h3>
    <div class="action-list">
      <ui-button variant="primary" class="pill-btn" [routerLink]="['/salesman/visits/new']">Start visit</ui-button>
      <ui-button variant="secondary" class="pill-btn" [routerLink]="['/salesman/visits']">Check in</ui-button>
      <ui-button variant="secondary" class="pill-btn" [routerLink]="['/salesman/visits']">Capture location</ui-button>
    </div>
  </section>
</div>
