<ui-page-shell title="Retailers" eyebrow="sales" description="Review assigned retailers, balances, and follow-up status.">
  <ng-container slot="actions">
    <ui-button variant="secondary">Export</ui-button>
    <ui-button>+ Connect</ui-button>
  </ng-container>

  <ui-empty-state *ngIf="loading" title="Loading retailers" description="Gathering the latest assigned retailer list."></ui-empty-state>
  <ui-empty-state *ngIf="error && !loading" title="We hit a snag" [description]="error" tone="error"></ui-empty-state>

  <div class="page-grid" *ngIf="!loading && !error">
    <ui-card *ngFor="let retailer of retailers" [title]="retailer.name" [subtitle]="retailer.address">
      <div class="retailer-card__meta">
        <ui-badge [type]="retailer.status === 'Active' ? 'success' : 'warning'">{{ retailer.status }}</ui-badge>
        <span class="retailer-card__value">{{ retailer.outstanding }}</span>
      </div>
      <div class="retailer-card__footer">
        <span>Last visit: {{ retailer.lastVisit }}</span>
      </div>
    </ui-card>
  </div>
</ui-page-shell>\n
