<div class="followup-shell">
  <section class="followup-card">
    <div class="panel-header">
      <h3>Follow-ups</h3>
      <ui-button variant="primary" class="pill-btn">+ Add task</ui-button>
    </div>
    <div class="followup-list">
      <div class="followup-item" *ngFor="let followup of followups">
        <div>
          <strong>{{ followup.retailer }}</strong>
          <p>{{ followup.type }}</p>
        </div>
        <div class="followup-meta">
          <span class="priority">{{ followup.priority }}</span>
          <span class="due">Due {{ followup.due }}</span>
        </div>
      </div>
    </div>
  </section>
</div>
