<ui-page-shell title="Collections" eyebrow="field finance" description="Review collection progress and follow-up status for your assigned retailers.">
  <div class="module-shell">
    <ui-card title="Collection follow-up" subtitle="Current assigned retailers">
      <div class="module-list" *ngIf="collections.length; else emptyState">
        <div class="module-row" *ngFor="let item of collections">
          <span>{{ item.retailer }}</span>
          <strong>{{ item.amount }} · {{ item.status }}</strong>
        </div>
      </div>
      <ng-template #emptyState>
        <ui-empty-state title="No collections yet" description="Collections will appear once follow-ups are recorded."></ui-empty-state>
      </ng-template>
    </ui-card>
  </div>
</ui-page-shell>\n
