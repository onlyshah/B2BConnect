<div class="sample-shell">
  <section class="sample-card">
    <div class="panel-header">
      <h3>Sample requests</h3>
      <ui-button variant="primary" class="pill-btn">+ Request sample</ui-button>
    </div>
    <div class="sample-list">
      <div class="sample-item" *ngFor="let sample of samples">
        <div>
          <strong>{{ sample.product }}</strong>
          <p>{{ sample.retailer }} • {{ sample.qty }}</p>
        </div>
        <span class="status">{{ sample.status }}</span>
      </div>
    </div>
  </section>
</div>
