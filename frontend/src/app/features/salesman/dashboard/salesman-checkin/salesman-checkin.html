<div class="checkin-card\">
  <div class=\"panel-header\">
    <h3>Attendance</h3>
    <span class=\"status-badge\" [ngClass]=\"isCheckedIn ? 'checked-in' : 'checked-out'\">
      {{ isCheckedIn ? 'On Duty' : 'Off Duty' }}
    </span>
  </div>

  <div *ngIf=\"error\" class=\"error-message\">{{ error }}</div>

  <div class=\"checkin-time\" *ngIf=\"checkedInTime\">
    <p class=\"label\">Checked in at</p>
    <p class=\"time\">{{ checkedInTime }}</p>
  </div>

  <div class=\"location-info\" *ngIf=\"currentLocation\">
    <p class="label">Live location</p>
    <p class="coords">{{ currentLocation }}</p>
  </div>

  <div class="map-preview" *ngIf="mapUrl">
    <iframe [src]="mapUrl" width="100%" height="220" frameborder="0"></iframe>
  </div>

  <div class=\"action-buttons\">
    <button
      *ngIf=\"!isCheckedIn\"
      (click)=\"checkIn()\"
      [disabled]="loading || !currentGeoLocation"
      class="btn-checkin"
    >
      {{ loading ? 'Getting location...' : 'Check In' }}
    </button>

    <button
      *ngIf="isCheckedIn"
      (click)="checkOut()"
      [disabled]="loading || !currentGeoLocation"
      class=\"btn-checkout\"
    >
      {{ loading ? 'Getting location...' : 'Check Out' }}
    </button>
  </div>

  <div class=\"stats\" *ngIf=\"attendance\">
    <div class=\"stat-item\">
      <span class=\"label\">Working hours</span>
      <span class=\"value\">{{ attendance.workingHours || 'N/A' }}</span>
    </div>
    <div class=\"stat-item\">
      <span class=\"label\">Visits today</span>
      <span class=\"value\">{{ attendance.completedVisits || 0 }}</span>
    </div>
    <div class=\"stat-item\">
      <span class=\"label\">Orders</span>
      <span class=\"value\">{{ attendance.ordersGenerated || 0 }}</span>
    </div>
  </div>
</div>
