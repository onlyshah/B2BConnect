<ui-page-shell title="Analytics" eyebrow="insights" description="Inspect distributor performance, order trends, and inventory health at a glance.">
  <div class="module-shell">
    <div class="module-hero">
      <span class="module-tag">Performance view</span>
      <h2>Track what matters across your network</h2>
      <p>View KPIs for retailers, orders, inventory, and billing in one overview.</p>
    </div>

    <div class="module-grid" *ngIf="metrics.length">
      <ui-card *ngFor="let metric of metrics" [title]="metric.label" [subtitle]="metric.icon">
        <div class="metric-value">{{ metric.value }}</div>
      </ui-card>
    </div>

    <ui-empty-state *ngIf="loading" title="Loading analytics" description="Preparing your distributor insights."></ui-empty-state>
    <ui-empty-state *ngIf="error && !loading" title="Unavailable" [description]="error" tone="error"></ui-empty-state>
  </div>
</ui-page-shell>\n
