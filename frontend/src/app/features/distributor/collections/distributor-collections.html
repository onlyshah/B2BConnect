<ui-page-shell title="Collections" eyebrow="finance" description="Monitor outstanding dues and follow up on collection progress across your retailer base.">
  <div class="module-shell">
    <ui-card title="Current collection queue" subtitle="Latest pending records">
      <div class="module-list" *ngIf="collections.length; else emptyState">
        <div class="module-row" *ngFor="let item of collections">
          <span>{{ item.retailerName || item.retailer?.name || 'Retailer' }}</span>
          <strong>{{ item.amount || item.totalAmount || '—' }}</strong>
        </div>
      </div>

      <ng-template #emptyState>
        <ui-empty-state title="No collection activity" description="There are no collection records to display right now."></ui-empty-state>
      </ng-template>
    </ui-card>
  </div>
</ui-page-shell>\n
