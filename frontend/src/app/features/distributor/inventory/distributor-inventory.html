<ui-page-shell title="Inventory" eyebrow="operations" description="Monitor stock movement and restocking needs across your distributor network.">
  <div class="module-shell">
    <ui-card title="Stock overview" subtitle="Current inventory status">
      <div class="module-list" *ngIf="inventory.length; else emptyState">
        <div class="module-row" *ngFor="let item of inventory">
          <span>{{ item.name || item.product?.name || 'Inventory item' }}</span>
          <strong>{{ item.availableQty ?? item.quantity ?? 0 }} units</strong>
        </div>
      </div>
      <ng-template #emptyState>
        <ui-empty-state title="No inventory records" description="Inventory data will appear here once stock is synced."></ui-empty-state>
      </ng-template>
    </ui-card>
  </div>
</ui-page-shell>\n
