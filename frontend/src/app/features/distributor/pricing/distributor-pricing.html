<ui-card class="card">
  <div class="card-header">
    <div>
      <p class="eyebrow">Pricing management</p>
      <h3>Retailer and area-wise pricing</h3>
    </div>
    <a class="primary-link" routerLink="/distributor/schemes">Manage schemes</a>
  </div>

  <div *ngIf="loading">Loading pricing rules...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="list" *ngIf="!loading && !error">
    <div class="list-item" *ngFor="let item of pricing">
      <div>
        <strong>{{ item.productName || item.name || 'Pricing rule' }}</strong>
        <p>{{ item.channel || 'Retailer' }}</p>
      </div>
      <span class="pill">₹{{ item.price || 0 }}</span>
    </div>
  </div>
</ui-card>
