<div class="card">
  <div class="card-header">
    <div>
      <p class="eyebrow">Retailer management</p>
      <h3>Retail network</h3>
    </div>
    <a class="primary-link" routerLink="/distributor/orders">Create order</a>
  </div>

  <div *ngIf="loading">Loading retailers...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="list" *ngIf="!loading && !error">
    <div class="list-item" *ngFor="let retailer of retailers">
      <div>
        <strong>{{ retailer.name || retailer.storeName || 'Retailer' }}</strong>
        <p>{{ retailer.phone || retailer.mobile || 'No contact' }}</p>
      </div>
      <span class="pill">{{ retailer.status || 'pending' }}</span>
    </div>
  </div>
</div>
