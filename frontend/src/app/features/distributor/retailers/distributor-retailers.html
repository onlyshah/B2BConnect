<ui-page-shell title="Retailers" eyebrow="network" description="Review your distributor retail network and top-performing partners.">
  <ng-container slot="actions">
    <ui-button variant="secondary">Export</ui-button>
    <ui-button>+ Add retailer</ui-button>
  </ng-container>

  <ui-empty-state *ngIf="loading" title="Loading retailers" description="Gathering the latest retail partner data."></ui-empty-state>
  <ui-empty-state *ngIf="error && !loading" title="We hit a snag" [description]="error" tone="error"></ui-empty-state>

  <div class="page-grid" *ngIf="!loading && !error">
    <ui-card *ngFor="let retailer of retailers" [title]="retailer?.name || 'Retailer'" [subtitle]="retailer?.city || 'Regional partner'">
      <div class="retailer-card__meta">
        <span>{{ retailer?.status || 'active' }}</span>
        <strong>{{ retailer?.outstandingBalance || 0 | currency:'INR':'symbol':'1.0-0' }}</strong>
      </div>
    </ui-card>
  </div>
</ui-page-shell>\n
