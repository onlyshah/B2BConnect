<div class="products-container">
  <h2>Products Catalog</h2>

  <div *ngIf="loading" class="loading">Loading products...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="products-grid">
    <div *ngFor="let product of products" class="product-card">
      <div class="product-header">
        <h3>{{ product.name }}</h3>
        <span class="sku">{{ product.sku }}</span>
      </div>

      <div class="product-details">
        <p><strong>MRP:</strong> ₹{{ product.mrp }}</p>
        <p><strong>Pack Size:</strong> {{ product.packSize }}</p>
        <p><strong>GST:</strong> {{ product.gst }}%</p>
      </div>

      <div class="product-benefits">
        <p *ngIf="product.benefits?.length">
          <strong>Benefits:</strong> {{ product.benefits.join(', ') }}
        </p>
      </div>

      <div class="product-actions">
        <button class="btn-view">View Details</button>
        <button class="btn-order">Order Now</button>
      </div>
    </div>
  </div>

  <div *ngIf="products.length === 0 && !loading" class="no-products">
    No products available
  </div>
</div>
