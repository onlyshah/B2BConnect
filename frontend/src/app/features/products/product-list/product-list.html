<ui-page-shell
  title="Products"
  eyebrow="catalog"
  description="Track product availability, pricing, and launch status from one place."
>
  <ng-container slot="actions">
    <ui-button variant="secondary">Export</ui-button>
    <ui-button>+ Add product</ui-button>
  </ng-container>

  <ui-list-toolbar title="Catalog overview" subtitle="Manage products with a consistent action bar.">
    <ng-container slot="actions">
      <ui-button variant="secondary">Filter</ui-button>
      <ui-button>+ New</ui-button>
    </ng-container>
  </ui-list-toolbar>

  <div class="page-grid" *ngIf="!loading && !error">
    <ui-kpi-card label="Visible products" [value]="products.length.toString()" hint="Live catalog count"></ui-kpi-card>
    <ui-kpi-card label="Inventory focus" [value]="(products.length ? 'Ready' : 'Pending')" hint="Operational readiness"></ui-kpi-card>
  </div>

  <ui-form-field label="Search catalog" hint="Use this shared field pattern for future list screens">
    <input type="text" placeholder="Search products" />
  </ui-form-field>

  <ui-data-table
    title="Catalog overview"
    subtitle="A reusable table for products and similar entity lists"
    [columns]="overviewColumns"
    [rows]="products"
    [loading]="loading"
    emptyTitle="No products yet"
    emptyDescription="Add your first product to start building the catalog."
  ></ui-data-table>

  <ui-empty-state *ngIf="loading" title="Loading products" description="Fetching your catalog details."></ui-empty-state>
  <ui-empty-state *ngIf="error" title="We hit a snag" [description]="error" tone="error"></ui-empty-state>
  <ui-empty-state *ngIf="!loading && !error && !products.length" title="No products yet" description="Add your first product to start building the catalog." tone="neutral"></ui-empty-state>
</ui-page-shell>\n
