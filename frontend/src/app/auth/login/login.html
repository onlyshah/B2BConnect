<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">B</div>
      <div>
        <div class="brand-title">B2BConnect</div>
        <div class="brand-subtitle">Purple Admin experience</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="auth-copy">Sign in to continue to your workspace.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <label class="auth-field">
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="name@company.com" />
      </label>

      <label class="auth-field">
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="Enter your password" />
      </label>

      <button type="submit" class="auth-submit" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>

      <p *ngIf="error" class="auth-error">{{ error }}</p>
    </form>
  </div>
</div>\n
