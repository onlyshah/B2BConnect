<ion-content class="register-container">
  <ion-card class="register-card">
    <ion-card-header>
      <ion-card-title>Register as Retailer</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <ion-item>
          <ion-label position="floating">Full Name</ion-label>
          <ion-input formControlName="name" placeholder="Your name"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input
            formControlName="email"
            type="email"
            placeholder="your@email.com"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Phone</ion-label>
          <ion-input
            formControlName="phone"
            type="tel"
            placeholder="10-digit phone"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Password</ion-label>
          <ion-input
            formControlName="password"
            type="password"
            placeholder="Min 6 characters"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Store Name</ion-label>
          <ion-input
            formControlName="storeName"
            placeholder="Your store name"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Company ID</ion-label>
          <ion-input formControlName="companyId" placeholder="Company ID"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Distributor ID</ion-label>
          <ion-input
            formControlName="distributorId"
            placeholder="Distributor ID"
          ></ion-input>
        </ion-item>

        <ion-text *ngIf="error" color="danger" class="error-text">
          <p>{{ error }}</p>
        </ion-text>

        <ion-text *ngIf="success" color="success" class="success-text">
          <p>{{ success }}</p>
        </ion-text>

        <ion-button
          expand="block"
          [disabled]="registerForm.invalid || loading"
          (click)="onSubmit()"
          color="primary"
          class="ion-margin-top"
        >
          {{ loading ? 'Registering...' : 'Register' }}
        </ion-button>

        <p class="login-link">
          Already registered? <a routerLink="/login">Login here</a>
        </p>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
