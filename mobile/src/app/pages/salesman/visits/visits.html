<ion-content class="visits-page">
  <div *ngIf="loading" class="loading">
    <ion-text>Loading visits...</ion-text>
  </div>

  <div *ngIf="!loading" class="visits-container">
    <ion-card *ngFor="let visit of visits" class="visit-card">
      <ion-card-header>
        <ion-card-title>{{ visit.retailer?.name }}</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <p><strong>Date:</strong> {{ visit.visitDate | date: 'dd-MMM-yyyy' }}</p>
        <p><strong>Purpose:</strong> {{ visit.purpose }}</p>
        <p><strong>Status:</strong> {{ visit.status }}</p>
        <p><strong>Outcome:</strong> {{ visit.visitOutcome }}</p>

        <ion-button
          expand="block"
          [routerLink]="'/home/visits/' + visit._id"
          color="primary"
          class="ion-margin-top"
        >
          View Details
        </ion-button>
      </ion-card-content>
    </ion-card>

    <div *ngIf="visits.length === 0" class="no-visits">
      <ion-text>No visits recorded yet</ion-text>
      <ion-button routerLink="/home/visits/new" color="primary" class="ion-margin-top">
        Record First Visit
      </ion-button>
    </div>
  </div>
</ion-content>
