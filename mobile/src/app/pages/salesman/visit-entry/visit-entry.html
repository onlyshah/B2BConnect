<ion-content class="visit-entry-page">
  <ion-card class="visit-card">
    <ion-card-header>
      <ion-card-title>Record Visit</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <form [formGroup]="visitForm" (ngSubmit)="onSubmit()">
        <ion-item>
          <ion-label position="floating">Retailer</ion-label>
          <ion-input
            formControlName="retailer"
            placeholder="Enter retailer name"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Purpose</ion-label>
          <select formControlName="purpose" style="width: 100%">
            <option value="order-collection">Order Collection</option>
            <option value="stock-verification">Stock Verification</option>
            <option value="product-demo">Product Demo</option>
            <option value="feedback">Feedback</option>
          </select>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Discussion Notes</ion-label>
          <ion-input
            formControlName="discussionNotes"
            placeholder="Enter notes"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Retailer Interest</ion-label>
          <select formControlName="retailerInterest" style="width: 100%">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Visit Outcome</ion-label>
          <select formControlName="visitOutcome" style="width: 100%">
            <option value="order-placed">Order Placed</option>
            <option value="completed">Completed</option>
            <option value="follow-up-required">Follow-Up Required</option>
          </select>
        </ion-item>

        <ion-text *ngIf="error" color="danger" class="error-text">
          <p>{{ error }}</p>
        </ion-text>

        <ion-text *ngIf="success" color="success" class="success-text">
          <p>{{ success }}</p>
        </ion-text>

        <ion-button
          expand="block"
          [disabled]="visitForm.invalid || loading"
          (click)="onSubmit()"
          color="primary"
          class="ion-margin-top"
        >
          {{ loading ? 'Recording...' : 'Record Visit' }}
        </ion-button>

        <ion-button
          expand="block"
          fill="outline"
          color="medium"
          routerLink="/home/visits"
          class="ion-margin-top"
        >
          Cancel
        </ion-button>
      </form>

      <ion-button
        expand="block"
        fill="outline"
        color="secondary"
        (click)="getCurrentLocation()"
        class="ion-margin-top"
      >
        <ion-icon slot="start" name="mapOutline"></ion-icon>
        Get Current Location
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
